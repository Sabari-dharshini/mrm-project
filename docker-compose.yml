version: "3.9"

# ─────────────────────────────────────────────────────────────
#  MRM PG - Docker Compose (Production)
#  Services: backend · admin · member · user
#  Database: AWS RDS PostgreSQL (external - NOT in compose)
#  Run: docker compose --env-file .env up -d --build
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────
  mrmpg-backend:
    build:
      context: ./mrmpg-backend
      dockerfile: Dockerfile
    container_name: mrmpg-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      COMPANY_NAME: ${COMPANY_NAME}
      COMPANY_WEBSITE: ${COMPANY_WEBSITE}
      BACKEND_DOMAIN: ${EC2_PUBLIC_IP}:5000
      USER_DOMAIN: ${EC2_PUBLIC_IP}:5173
      ADMIN_DOMAIN: ${EC2_PUBLIC_IP}:5174
      MEMBER_DOMAIN: ${EC2_PUBLIC_IP}:5175
      CORS_ORIGIN: http://${EC2_PUBLIC_IP}:5173,http://${EC2_PUBLIC_IP}:5174,http://${EC2_PUBLIC_IP}:5175
      TRUST_PROXY: auto
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mrm_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Admin UI ────────────────────────────────────────────────
  mrmpg-admin:
    build:
      context: ./mrmpg-admin
      dockerfile: Dockerfile
      args:
        VITE_APP_API_URL: http://${EC2_PUBLIC_IP}:5000/api/v1
        VITE_APP_ADMIN_URL: http://${EC2_PUBLIC_IP}:5000/api/v1/admin
        VITE_APP_BASE_URL: http://${EC2_PUBLIC_IP}:5174
    container_name: mrmpg-admin
    restart: unless-stopped
    ports:
      - "5174:5174"
    networks:
      - mrm_network
    depends_on:
      mrmpg-backend:
        condition: service_healthy

  # ── Member UI ───────────────────────────────────────────────
  mrmpg-member:
    build:
      context: ./mrmpg-member
      dockerfile: Dockerfile
      args:
        VITE_MEMBER_BASE_URL: http://${EC2_PUBLIC_IP}:5000/api/v1
        VITE_MEMBER_IMAGE_BASE_URL: http://${EC2_PUBLIC_IP}:5000/
        VITE_MEMBER_APP_TITLE: "MRM PG Member Portal"
    container_name: mrmpg-member
    restart: unless-stopped
    ports:
      - "5175:5175"
    networks:
      - mrm_network
    depends_on:
      mrmpg-backend:
        condition: service_healthy

  # ── User (Public) UI ────────────────────────────────────────
  mrmpg-user:
    build:
      context: ./mrmpg-user
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://${EC2_PUBLIC_IP}:5000/api/v1
        VITE_APP_TITLE: "MRM PG"
    container_name: mrmpg-user
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - mrm_network
    depends_on:
      mrmpg-backend:
        condition: service_healthy

# ── Volumes ──────────────────────────────────────────────────
volumes:
  uploads_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  mrm_network:
    driver: bridge
